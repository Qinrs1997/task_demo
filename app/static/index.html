<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Management API Test UI</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #64748b;
        --line: #d8dee8;
        --brand: #2563eb;
        --brand-strong: #1d4ed8;
        --danger: #dc2626;
        --ok: #059669;
        --warn: #b45309;
        --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 650;
        min-height: 38px;
        padding: 0 14px;
        transition:
          background 0.15s ease,
          transform 0.15s ease,
          box-shadow 0.15s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        transform: none;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--text);
        min-height: 38px;
        padding: 9px 10px;
        outline: none;
      }

      textarea {
        min-height: 88px;
        resize: vertical;
      }

      input:focus,
      select:focus,
      textarea:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }

      .page {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 18px;
      }

      .title h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .title p {
        margin: 6px 0 0;
        color: var(--muted);
      }

      .api-key {
        display: grid;
        grid-template-columns: 120px minmax(180px, 260px);
        align-items: center;
        gap: 10px;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        border-bottom: 1px solid var(--line);
      }

      .panel-header h2 {
        margin: 0;
        font-size: 17px;
        letter-spacing: 0;
      }

      .panel-body {
        padding: 18px;
      }

      .form-grid {
        display: grid;
        gap: 14px;
      }

      .field {
        display: grid;
        gap: 7px;
      }

      .field label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .btn-primary {
        background: var(--brand);
        color: #fff;
      }

      .btn-primary:hover {
        background: var(--brand-strong);
      }

      .btn-muted {
        background: #e8edf5;
        color: #263244;
      }

      .btn-danger {
        background: #fee2e2;
        color: var(--danger);
      }

      .btn-ok {
        background: #dcfce7;
        color: var(--ok);
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(120px, 160px) 88px 88px auto;
        gap: 10px;
        align-items: end;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 720px;
      }

      th,
      td {
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
        text-align: left;
        vertical-align: middle;
      }

      th {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        text-transform: uppercase;
      }

      td {
        font-size: 14px;
      }

      .task-title {
        font-weight: 750;
      }

      .task-desc {
        color: var(--muted);
        margin-top: 4px;
        max-width: 320px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        min-width: 92px;
        min-height: 28px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 750;
      }

      .badge.pending {
        background: #fef3c7;
        color: var(--warn);
      }

      .badge.completed {
        background: #d1fae5;
        color: var(--ok);
      }

      .row-actions {
        display: flex;
        gap: 8px;
        min-width: 190px;
      }

      .notice {
        min-height: 38px;
        display: flex;
        align-items: center;
        margin-top: 14px;
        border-radius: 6px;
        padding: 0 12px;
        color: var(--muted);
        background: #eef2f7;
      }

      .notice.error {
        background: #fee2e2;
        color: var(--danger);
      }

      .notice.success {
        background: #dcfce7;
        color: var(--ok);
      }

      .empty {
        padding: 40px 18px;
        text-align: center;
        color: var(--muted);
      }

      @media (max-width: 860px) {
        .topbar,
        .layout {
          grid-template-columns: 1fr;
          display: grid;
        }

        .api-key {
          grid-template-columns: 1fr;
        }

        .toolbar {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="topbar">
        <div class="title">
          <h1>Task Management API</h1>
          <p>FastAPI CRUD 测试面板</p>
        </div>
        <label class="api-key">
          <span>API Key</span>
          <input id="apiKey" type="password" value="dev-secret" autocomplete="off" />
        </label>
      </section>

      <section class="layout">
        <form class="panel" id="taskForm">
          <div class="panel-header">
            <h2>创建任务</h2>
          </div>
          <div class="panel-body form-grid">
            <div class="field">
              <label for="title">标题</label>
              <input id="title" name="title" maxlength="120" required />
            </div>
            <div class="field">
              <label for="description">描述</label>
              <textarea id="description" name="description" maxlength="1000"></textarea>
            </div>
            <div class="field">
              <label for="dueDate">截止时间</label>
              <input id="dueDate" name="dueDate" type="datetime-local" required />
            </div>
            <div class="actions">
              <button class="btn-primary" type="submit">创建</button>
              <button class="btn-muted" type="button" id="resetForm">重置</button>
            </div>
            <div id="formNotice" class="notice">等待操作</div>
          </div>
        </form>

        <section class="panel">
          <div class="panel-header">
            <h2>任务列表</h2>
          </div>
          <div class="panel-body">
            <div class="toolbar">
              <div class="field">
                <label for="statusFilter">状态</label>
                <select id="statusFilter">
                  <option value="">全部</option>
                  <option value="pending">pending</option>
                  <option value="completed">completed</option>
                </select>
              </div>
              <div class="field">
                <label for="limit">Limit</label>
                <input id="limit" type="number" min="1" max="100" value="20" />
              </div>
              <div class="field">
                <label for="offset">Offset</label>
                <input id="offset" type="number" min="0" value="0" />
              </div>
              <button class="btn-primary" type="button" id="refreshTasks">刷新</button>
            </div>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>ID</th>
                  <th>任务</th>
                  <th>状态</th>
                  <th>截止时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="taskRows"></tbody>
            </table>
            <div id="emptyState" class="empty" hidden>暂无任务</div>
          </div>
        </section>
      </section>
    </main>

    <script>
      const apiKeyInput = document.querySelector("#apiKey");
      const form = document.querySelector("#taskForm");
      const titleInput = document.querySelector("#title");
      const descriptionInput = document.querySelector("#description");
      const dueDateInput = document.querySelector("#dueDate");
      const formNotice = document.querySelector("#formNotice");
      const taskRows = document.querySelector("#taskRows");
      const emptyState = document.querySelector("#emptyState");
      const statusFilter = document.querySelector("#statusFilter");
      const limitInput = document.querySelector("#limit");
      const offsetInput = document.querySelector("#offset");

      apiKeyInput.value = localStorage.getItem("taskApiKey") || "dev-secret";

      function setDefaultDueDate() {
        const nextDay = new Date(Date.now() + 24 * 60 * 60 * 1000);
        nextDay.setMinutes(nextDay.getMinutes() - nextDay.getTimezoneOffset());
        dueDateInput.value = nextDay.toISOString().slice(0, 16);
      }

      function setNotice(message, type = "") {
        formNotice.textContent = message;
        formNotice.className = `notice ${type}`.trim();
      }

      function formatDate(value) {
        return new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value));
      }

      async function apiFetch(path, options = {}) {
        localStorage.setItem("taskApiKey", apiKeyInput.value);
        const response = await fetch(path, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            "X-API-Key": apiKeyInput.value,
            ...(options.headers || {}),
          },
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `HTTP ${response.status}`);
        }

        if (response.status === 204) {
          return null;
        }
        return response.json();
      }

      function createPayload() {
        return {
          title: titleInput.value.trim(),
          description: descriptionInput.value.trim() || null,
          due_date: new Date(dueDateInput.value).toISOString(),
        };
      }

      const apiPrefix = "/api/v1";

      async function loadTasks() {
        const params = new URLSearchParams({
          limit: limitInput.value || "20",
          offset: offsetInput.value || "0",
        });
        if (statusFilter.value) {
          params.set("status", statusFilter.value);
        }

        const result = await apiFetch(`${apiPrefix}/tasks?${params.toString()}`);
        renderTasks(result.data.items);
      }

      function renderTasks(tasks) {
        taskRows.innerHTML = "";
        emptyState.hidden = tasks.length > 0;

        for (const task of tasks) {
          const row = document.createElement("tr");
          row.innerHTML = `
            <td>${task.id}</td>
            <td>
              <div class="task-title"></div>
              <div class="task-desc"></div>
            </td>
            <td><span class="badge ${task.status}">${task.status}</span></td>
            <td>${formatDate(task.due_date)}</td>
            <td>
              <div class="row-actions">
                <button class="btn-ok" data-action="complete" data-id="${task.id}">完成</button>
                <button class="btn-danger" data-action="delete" data-id="${task.id}">删除</button>
              </div>
            </td>
          `;
          row.querySelector(".task-title").textContent = task.title;
          row.querySelector(".task-desc").textContent = task.description || "";
          row.querySelector('[data-action="complete"]').disabled =
            task.status === "completed";
          taskRows.append(row);
        }
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        setNotice("正在创建...");
        try {
          await apiFetch(`${apiPrefix}/tasks`, {
            method: "POST",
            body: JSON.stringify(createPayload()),
          });
          form.reset();
          setDefaultDueDate();
          setNotice("创建成功", "success");
          await loadTasks();
        } catch (error) {
          setNotice(error.message, "error");
        }
      });

      document.querySelector("#resetForm").addEventListener("click", () => {
        form.reset();
        setDefaultDueDate();
        setNotice("已重置");
      });

      document.querySelector("#refreshTasks").addEventListener("click", async () => {
        setNotice("正在刷新...");
        try {
          await loadTasks();
          setNotice("刷新完成", "success");
        } catch (error) {
          setNotice(error.message, "error");
        }
      });

      taskRows.addEventListener("click", async (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) {
          return;
        }

        const taskId = button.dataset.id;
        const action = button.dataset.action;
        button.disabled = true;

        try {
          if (action === "complete") {
            await apiFetch(`${apiPrefix}/tasks/${taskId}`, {
              method: "PUT",
              body: JSON.stringify({ status: "completed" }),
            });
            setNotice(`任务 ${taskId} 已完成`, "success");
          }

          if (action === "delete") {
            await apiFetch(`${apiPrefix}/tasks/${taskId}`, { method: "DELETE" });
            setNotice(`任务 ${taskId} 已删除`, "success");
          }

          await loadTasks();
        } catch (error) {
          button.disabled = false;
          setNotice(error.message, "error");
        }
      });

      statusFilter.addEventListener("change", loadTasks);
      apiKeyInput.addEventListener("change", loadTasks);

      setDefaultDueDate();
      loadTasks().catch((error) => setNotice(error.message, "error"));
    </script>
  </body>
</html>
